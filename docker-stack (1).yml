version: "3.9"

services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - innovatech-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - innovatech-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  ms-project:
    image: innovatech/ms-project:latest
    ports:
      - "8081:8081"
    networks:
      - innovatech-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ms-resources:
    image: innovatech/ms-resources:latest
    ports:
      - "8082:8082"
    networks:
      - innovatech-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  ms-collaboration:
    image: innovatech/ms-collaboration:latest
    ports:
      - "8083:8083"
    networks:
      - innovatech-net
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  ms-analytics:
    image: innovatech/ms-analytics:latest
    ports:
      - "8084:8084"
    networks:
      - innovatech-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  innovatech-net:
    driver: overlay

volumes:
  postgres_data:
  mongo_data:
